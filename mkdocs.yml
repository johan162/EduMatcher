site_name: EduMatcher — Educational Trading System
site_description: A multi-process Python trading system for learning order matching and market microstructure.
site_author: Johan Persson <johan162@gmail.com>
site_url: https://github.com/johan162/EduMatcher

repo_name: johan162/EduMatcher
repo_url: https://github.com/johan162/EduMatcher

exclude_docs: |
  node_modules/
  .build/
  dist/
  package.json
  package-lock.json
  mermaid-filter.err

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - toc.integrate
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - How an Exchange Works: how-exchange-works.md
  - Concepts:
    - The Order Book: concepts/01-concepts-order-book.md
    - The Order Book Deep Dive: concepts/02-concepts-order-book-deep-dive.md
    - MM Quotes: concepts/03-concepts-mm-quotes.md
    - Your First Trade: concepts/04-concepts-first-trade.md
    - A Full Trading Day: concepts/05-concepts-trading-day.md
    - Market Data Feed (CALF): concepts/06-concepts-market-data-feed.md
  - User Guide:
    - Getting Started: user-guide/00-getting-started.md
    - Configuration: user-guide/01-configuration.md
    - Controlling the Exchange: user-guide/02-commands.md
    - Running the Engine: user-guide/03-running-the-engine.md
    - Order Types: user-guide/04-order-types.md
    - Combo Orders: user-guide/05-combos.md
    - Auctions & Scheduling: user-guide/06-auctions-scheduling.md
    - P&L & Clearing: user-guide/07-pnl-clearing.md
    - Gateway Commands: user-guide/08-gateway.md
    - Messages: user-guide/09-messages.md
    - Processes: user-guide/10-processes.md
    - Persistence: user-guide/11-persistence.md
    - Risk Controls: user-guide/12-risk-controls.md
    - Drop Copy: user-guide/13-drop-copy.md
    - Market Making: user-guide/14-market-maker.md
    - AI Traders: user-guide/15-ai-traders.md
    - Statistics and Reporting: user-guide/16-statistics-and-reporting.md
    - Appendix - ALF Protocol: user-guide/20-app-alf-protocol.md
    - Appendix - BALF Protocol: user-guide/21-app-balf-protocol.md
    - Appendix - CALF Protocol: user-guide/22-app-calf-protocol.md
  - Architecture: 
