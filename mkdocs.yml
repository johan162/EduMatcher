site_name: EduMatcher — Educational Trading System
site_description: A multi-process Python trading system for learning order matching, FIX protocols, and market microstructure.
site_author: EduMatcher

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Concepts:
    - The Order Book: concepts-order-book.md
    - Your First Trade: concepts-first-trade.md
    - A Full Trading Day: concepts-trading-day.md
    - Glossary: glossary.md
  - Matcher Reference:
    - Order Types: order-types.md
    - Combo Orders: combos.md
    - Auctions & Scheduling: auction.md
    - P&L & Clearing: pnl.md
    - Gateway Commands: gateway.md
    - Messages: messages.md
    - Processes: processes.md
    - Configuration: configuration.md
    - Persistence: persistence.md
  - Architecture: architecture.md
  - Developer:
    - AI Bot Traders: ai-bot.md
    - Exchange Experiments: experiements.md
    - Verification: verification.md
  - FAQ: faq.md
