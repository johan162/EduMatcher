site_name: EduMatcher — Educational Trading System
site_description: A multi-process Python trading system for learning order matching, FIX protocols, and market microstructure.
site_author: EduMatcher

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - How an Exchange Works: introduction-exchange-concepts.md
  - Concepts:
    - The Order Book: concepts-order-book.md
    - The Order Book Deep Dive: order-book-deep-dive.md
    - MM Quotes: mm-quotes.md
    - Your First Trade: concepts-first-trade.md
    - A Full Trading Day: concepts-trading-day.md
  - User Guide:
    - Order Types: order-types.md
    - Combo Orders: combos.md
    - Auctions & Scheduling: auction.md
    - P&L & Clearing: pnl.md
    - Gateway Commands: gateway.md
    - Messages: messages.md
    - Processes: processes.md
    - Configuration: configuration.md
    - Persistence: persistence.md
    - Risk Controls: risk-controls.md
    - Exchange Commands: commands.md
    - Drop Copy: drop-copy.md
  - Architecture: 
    - Overview: architecture.md
    - Detailed Walkthrough: architecture-guide.md
  - Developer Info:
    - AI Bot Traders: ai-bot.md
    - Experiments: experiements.md
    - Verification: verification.md
  - Glossary: glossary.md
  - FAQ: faq.md
