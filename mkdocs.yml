site_name: EduMatcher — Educational Trading System
site_description: A multi-process Python trading system for learning order matching and market microstructure.
site_author: Johan Persson <johan162@gmail.com>

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - How an Exchange Works: how-exchange-works.md
  - Concepts:
    - The Order Book: concepts/01-concepts-order-book.md
    - The Order Book Deep Dive: concepts/02-concepts-order-book-deep-dive.md
    - MM Quotes: concepts/03-concepts-mm-quotes.md
    - Your First Trade: concepts/04-concepts-first-trade.md
    - A Full Trading Day: concepts/05-concepts-trading-day.md
  - User Guide:
    - Configuration: user-guide/01-configuration.md
    - Controlling the Exchange: user-guide/02-commands.md
    - Running the Engine: user-guide/03-running-the-engine.md
    - Order Types: user-guide/04-order-types.md
    - Combo Orders: user-guide/05-combos.md
    - Auctions & Scheduling: user-guide/06-auctions-scheduling.md
    - P&L & Clearing: user-guide/07-pnl-clearing.md
    - Gateway Commands: user-guide/08-gateway.md
    - Messages: user-guide/09-messages.md
    - Processes: user-guide/10-processes.md
    - Persistence: user-guide/11-persistence.md
    - Risk Controls: user-guide/12-risk-controls.md
    - Drop Copy: user-guide/13-drop-copy.md
    - Appendix - ALF Protocol: user-guide/20-app-alf-protocol.md
  - Architecture: 
    - Overview: architecture/01-architecture.md
    - Detailed Walkthrough: architecture/02-architecture-guide.md
  - Developer Info:
    - Development Practice: developer/01-dev-practice.md
    - AI Bot Traders: developer/02-ai-bot.md
    - Experiments: developer/03-experiments.md
    - Verification: developer/04-verification.md
  - Glossary: glossary.md
  - FAQ: faq.md
