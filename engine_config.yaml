# EduMatcher — Matching Engine Configuration
#
# symbols:
#   <SYMBOL>:
#     last_buy_price:  <float>   # optional — seed "last buy" before any trades
#     last_sell_price: <float>   # optional — seed "last sell" before any trades
#     market_maker_quotes:       # optional — startup quote seeds (first startup)
#       - gateway_id: MM01       # must reference gateways.fix role=MARKET_MAKER
#         bid_price: 100.00
#         ask_price: 100.10
#         bid_qty: 100
#         ask_qty: 100
#         tif: DAY
#         quote_id: MM-AAPL-1
# gateways:
#   fix:
#     - id: TRADER01
#       description: Human trader workstation
#       role: TRADER
#       disconnect_behaviour: CANCEL_QUOTES_ONLY
#       quote_refresh_policy: INACTIVATE_ON_ANY_FILL
#       enforce_mm_obligation: false
#       mm_max_spread_ticks: 10
#       mm_min_qty: 100
#     - id: TRADER02
#       description: Strategy / high-frequency simulator
#
# Notes:
#   • Only symbols listed here are accepted by the engine.
#     Orders for any other symbol are rejected with "Symbol not configured".
#   • Only FIX gateway IDs listed under gateways.fix may connect and submit
#     order.new / order.cancel / order.orders_request messages.
#   • last_buy_price / last_sell_price are used only when no persisted
#     book_stats.json values exist for that symbol (config is the seed,
#     the live file takes precedence after the first trade).
#   • market_maker_quotes are injected once at startup by posting linked
#     quote bid/ask legs for the configured MARKET_MAKER gateway(s).
#   • If any MARKET_MAKER gateway is configured, define at least one
#     market_maker_quotes entry per symbol.
#   • On first startup, quotes become the seeded book liquidity.
#   • market_maker_combos are optional startup combo seeds injected once at
#     engine startup using gateway_id "MM".
#   • sessions_enabled controls scheduler-driven session handling in the engine.
#     - false: ignore session transitions, run continuous matching immediately.
#     - true: start in CLOSED and accept orders only when scheduler opens sessions.
#   • Supported order fields: SYM, SIDE, TYPE, QTY, PRICE, STOP, TIF, VISIBLE, SMP

sessions_enabled: false

gateways:
  fix:
    - id: TRADER01
      description: The first trader
      role: TRADER
      disconnect_behaviour: CANCEL_ALL
      quote_refresh_policy: INACTIVATE_ON_ANY_FILL
      enforce_mm_obligation: false
    - id: TRADER02
      description: High frequency
      role: MARKET_MAKER
      disconnect_behaviour: CANCEL_QUOTES_ONLY
      quote_refresh_policy: INACTIVATE_ON_FULL_FILL
      enforce_mm_obligation: true
      mm_max_spread_ticks: 10
      mm_min_qty: 100

symbols:
  MSFT:
    tick_decimals: 2
    last_buy_price:  415.00
    last_sell_price: 415.50
    market_maker_quotes:
      - gateway_id: TRADER02
        quote_id: MM-MSFT-1
        bid_price: 414.00
        ask_price: 416.00
        bid_qty: 1000
        ask_qty: 1000
        tif: DAY

  AAPL:
    tick_decimals: 2
    last_buy_price:  209.50
    last_sell_price: 210.50
    market_maker_quotes:
      - gateway_id: TRADER02
        quote_id: MM-AAPL-1
        bid_price: 209.00
        ask_price: 211.00
        bid_qty: 2000
        ask_qty: 2000
        tif: DAY

  TSLA:
    tick_decimals: 2
    last_buy_price:  248.00
    last_sell_price: 249.00
    market_maker_quotes:
      - gateway_id: TRADER02
        quote_id: MM-TSLA-1
        bid_price: 247.00
        ask_price: 250.00
        bid_qty: 500
        ask_qty: 500
        tif: DAY

market_maker_combos:
  - combo_id: MM-PAIR-AAPL-MSFT
    combo_type: AON
    tif: GTC
    legs:
      - symbol: AAPL
        side: BUY
        order_type: LIMIT
        quantity: 100
        price: 209.50
      - symbol: MSFT
        side: SELL
        order_type: LIMIT
        quantity: 50
        price: 415.50
  - combo_id: MM-ROTATION-MSFT-TSLA
    combo_type: AON
    tif: GTC
    legs:
      - symbol: MSFT
        side: BUY
        order_type: LIMIT
        quantity: 40
        price: 414.50
      - symbol: TSLA
        side: SELL
        order_type: LIMIT
        quantity: 80
        price: 249.50

# ---------------------------------------------------------------------------
# Session schedule (optional) — used by pm-scheduler
# ---------------------------------------------------------------------------
# Times are HH:MM in local time.  Omit the whole section to skip auctions
# and run continuous matching from engine startup (default behavior).
#
# schedule:
#   pre_open: "09:00"
#   opening_auction_start: "09:25"
#   continuous_start: "09:30"
#   closing_auction_start: "16:00"
#   closing_auction_end: "16:05"
