# -- Session control --
sessions_enabled: true  # true lets pm-scheduler drive session transitions; false keeps the engine in continuous mode

# -- Engine behavior --
enforce_collars: true  # enables per-symbol collar checks on incoming orders
enforce_circuit_breakers: true  # enables per-symbol circuit-breaker enforcement
snapshot_interval_sec: 0.5  # seconds between book snapshot publications for dirty books

# -- Market-maker obligation defaults --
mm_obligation_defaults:  # default market-maker obligation settings
  enforce_mm_obligation: false
  mm_max_spread_ticks: 20
  mm_min_qty: 100

# -- ALF gateway allowlist --
gateways:  # ALF gateway allowlist
  alf:
  - id: TRADER01
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: TRADER02
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: OPS01
    role: ADMIN
    disconnect_behaviour: LEAVE_ALL
  - id: MM01
    role: MARKET_MAKER
    disconnect_behaviour: CANCEL_QUOTES_ONLY
    quote_refresh_policy: INACTIVATE_ON_ANY_FILL

# -- RALF post-trade gateway --
post_trade_gateway:  # RALF post-trade gateway settings
  name: ralf-gwy01
  bind_address: 127.0.0.1
  port: 5580
  replay_retention_sec: 3600
  heartbeat_interval_sec: 1
  idle_timeout_sec: 10
  max_client_queue: 5000
  allowed_roles:
  - CLEARING
