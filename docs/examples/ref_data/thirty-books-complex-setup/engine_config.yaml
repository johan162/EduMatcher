# -- Session control --
sessions_enabled: true  # true lets pm-scheduler drive session transitions; false keeps the engine in continuous mode

# -- Engine behavior --
enforce_collars: true  # enables per-symbol collar checks on incoming orders
enforce_circuit_breakers: true  # enables per-symbol circuit-breaker enforcement
snapshot_interval_sec: 0.25  # seconds between book snapshot publications for dirty books

# -- Market-maker obligation defaults --
mm_obligation_defaults:  # default market-maker obligation settings
  enforce_mm_obligation: true
  mm_max_spread_ticks: 12
  mm_min_qty: 200
  symbols:
    AAPL:
      enforce_mm_obligation: true
      mm_max_spread_ticks: 8
      mm_min_qty: 300

# -- Collar profiles --
risk_controls:  # collar profiles by risk level
  levels:
    DEFAULT:
      collar:
        static_band_pct: 0.2
        dynamic_band_pct: 0.02
    CORE:
      collar:
        static_band_pct: 0.18
        dynamic_band_pct: 0.02
    HIGH_BETA:
      collar:
        static_band_pct: 0.12
        dynamic_band_pct: 0.04
  default_level: DEFAULT

# -- Circuit-breaker ladder --
circuit_breaker_defaults:  # circuit-breaker ladder definitions
  reference_window_ns: 300000000000
  levels:
    L1:
      price_shift_pct: 0.07
      halt_duration_ns: 300000000000
      resumption_mode: AUCTION
    L2:
      price_shift_pct: 0.13
      halt_duration_ns: 900000000000
      resumption_mode: AUCTION
    L3:
      price_shift_pct: 0.2
      halt_duration_ns: null    # null = rest-of-day halt
      resumption_mode: AUCTION

