# -- Session control --
# true lets pm-scheduler drive session transitions;
# false keeps the engine in continuous mode
sessions_enabled: false

# -- Engine behavior --
# enables per-symbol collar checks on incoming orders
enforce_collars: false
# enables per-symbol circuit-breaker enforcement
enforce_circuit_breakers: false

# -- Engine tuning --
# runtime retention and throttling knobs with memory/latency trade-offs
engine_tuning:
  # seconds between book snapshot publications for dirty books
  snapshot_interval_sec: 0.5
  # per-gateway RECENT/ALL quote history retained in memory
  quote_history_maxlen: 30
  # drop-copy replay messages retained in memory
  drop_copy_buffer_size: 10000
  # recent trades retained per symbol snapshot
  recent_trades_maxlen: 20
  # depth window around last trade in ticks; larger values publish more depth
  depth_snapshot_tolerance_ticks: 100

# -- Market-maker obligation defaults --
# default market-maker obligation settings
mm_obligation_defaults:
  enforce_mm_obligation: false
  mm_max_spread_ticks: 20
  mm_min_qty: 100

# -- ALF gateway allowlist --
# ALF gateway allowlist
gateways:
  alf:
  - id: TRADER01
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
    description: Student desk 1
  - id: TRADER02
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
    description: Student desk 2
  - id: OPS01
    role: ADMIN
    disconnect_behaviour: LEAVE_ALL
    description: Instructor console
  - id: MM01
    role: MARKET_MAKER
    disconnect_behaviour: CANCEL_QUOTES_ONLY
    description: Market maker
    quote_refresh_policy: INACTIVATE_ON_ANY_FILL

