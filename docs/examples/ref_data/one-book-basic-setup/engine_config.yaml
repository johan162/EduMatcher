# -- Session control --
sessions_enabled: false  # true lets pm-scheduler drive session transitions; false keeps the engine in continuous mode

# -- Engine behavior --
enforce_collars: false  # enables per-symbol collar checks on incoming orders
enforce_circuit_breakers: false  # enables per-symbol circuit-breaker enforcement
snapshot_interval_sec: 0.5  # seconds between book snapshot publications for dirty books

# -- Market-maker obligation defaults --
mm_obligation_defaults:  # default market-maker obligation settings
  enforce_mm_obligation: false
  mm_max_spread_ticks: 20
  mm_min_qty: 100

# -- ALF gateway allowlist --
gateways:  # ALF gateway allowlist
  alf:
  - id: TRADER01
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: TRADER02
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: OPS01
    role: ADMIN
    disconnect_behaviour: LEAVE_ALL
  - id: MM01
    role: MARKET_MAKER
    disconnect_behaviour: CANCEL_QUOTES_ONLY
    quote_refresh_policy: INACTIVATE_ON_ANY_FILL

# -- Symbol universe --
symbols:  # symbol universe
  AAPL:
    tick_decimals: 2
    last_buy_price: 191.86
    last_sell_price: 191.86
    market_maker_quotes:
    - gateway_id: MM01
      bid_price: 191.85
      ask_price: 191.87
      bid_qty: 1000
      ask_qty: 1000
      tif: DAY
      seed_once: true
    outstanding_shares: 15400000000
