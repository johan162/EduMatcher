# -- Session control --
sessions_enabled: false

# -- Engine behavior --
enforce_collars: true
enforce_circuit_breakers: true
snapshot_interval_sec: 0.5

# -- Market-maker obligation defaults --
mm_obligation_defaults:
  enforce_mm_obligation: false
  mm_max_spread_ticks: 20
  mm_min_qty: 100

# -- ALF gateway allowlist --
gateways:
  alf:
  - id: TRADER01
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: TRADER02
    role: TRADER
    disconnect_behaviour: CANCEL_ALL
  - id: OPS01
    role: ADMIN
    disconnect_behaviour: LEAVE_ALL
  - id: MM01
    role: MARKET_MAKER
    disconnect_behaviour: CANCEL_QUOTES_ONLY
    quote_refresh_policy: INACTIVATE_ON_ANY_FILL

# -- Symbol universe --
symbols:
  AAPL:
    tick_decimals: 2
    market_maker_quotes:
      # WARNING: pm-config-gen cannot set prices. Fill these in before starting.
    - gateway_id: MM01
      bid_price: 99.50    # REQUIRED: set display bid price (e.g. 209.00)
      ask_price: 100.50    # REQUIRED: set display ask price (e.g. 211.00)
      bid_qty: 1000
      ask_qty: 1000
      tif: DAY
      seed_once: true
