# Single-service deployment of the EduMatcher Config Builder.
#
#   docker compose up --build
#
# Then open http://localhost:8080. See docs/user-guide/27-config-GUI.md.
services:
  config-gui:
    build:
      context: .
      dockerfile: Dockerfile
      # Forward corporate proxy / registry settings into the build. These pick up
      # your shell's HTTP(S)_PROXY automatically; set NPM_REGISTRY (and, only if
      # your proxy does TLS interception, NPM_STRICT_SSL=false) as needed.
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        NPM_STRICT_SSL: ${NPM_STRICT_SSL:-true}
    image: edumatcher-config-gui:latest
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      # Restrict this to your site origin when exposed beyond localhost.
      CORS_ORIGIN: "*"
      # STATIC_DIR is baked into the image; override only if you relocate assets.
    restart: unless-stopped
